<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSCode Typing Animation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="vscode-container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <i class="fab fa-microsoft"></i>
                <span>Visual Studio Code</span>
            </div>
            <div class="header-center">
                <div class="window-controls">
                    <span class="window-control minimize"></span>
                    <span class="window-control maximize"></span>
                    <span class="window-control close"></span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-icons">
                    <div class="sidebar-icon active" title="Explorer">
                        <i class="fas fa-files-o"></i>
                    </div>
                    <div class="sidebar-icon" title="Search">
                        <i class="fas fa-search"></i>
                    </div>
                    <div class="sidebar-icon" title="Source Control">
                        <i class="fas fa-code-branch"></i>
                    </div>
                    <div class="sidebar-icon" title="Extensions">
                        <i class="fas fa-th-large"></i>
                    </div>
                </div>
                <div class="sidebar-content">
                    <div class="explorer-header">
                        <span>EXPLORER</span>
                        <i class="fas fa-ellipsis-h"></i>
                    </div>
                    <div class="file-tree">
                        <div class="folder open">
                            <i class="fas fa-folder-open"></i>
                            <span>typing-animation</span>
                        </div>
                        <div class="file-list">
                            <div class="file active">
                                <i class="fab fa-js-square"></i>
                                <span>main.js</span>
                            </div>
                            <div class="file">
                                <i class="fab fa-html5"></i>
                                <span>index.html</span>
                            </div>
                            <div class="file">
                                <i class="fab fa-css3-alt"></i>
                                <span>style.css</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Editor Area -->
            <div class="editor-area">
                <!-- Tab Bar -->
                <div class="tab-bar">
                    <div class="tab active">
                        <i class="fab fa-js-square"></i>
                        <span>main.js</span>
                        <i class="fas fa-times tab-close"></i>
                    </div>
                </div>

                <!-- Editor Container -->
                <div class="editor-container">
                    <div id="monaco-editor"></div>
                </div>

                <!-- Controls Panel -->
                <div class="controls-panel">
                    <div class="controls-group">
                        <label for="language-select">Language:</label>
                        <select id="language-select">
                            <option value="javascript">JavaScript (.js)</option>
                            <option value="typescript">TypeScript (.ts)</option>
                            <option value="python">Python (.py)</option>
                            <option value="java">Java (.java)</option>
                            <option value="cpp">C++ (.cpp)</option>
                            <option value="c">C (.c)</option>
                            <option value="csharp">C# (.cs)</option>
                            <option value="php">PHP (.php)</option>
                            <option value="ruby">Ruby (.rb)</option>
                            <option value="go">Go (.go)</option>
                            <option value="rust">Rust (.rs)</option>
                            <option value="swift">Swift (.swift)</option>
                            <option value="kotlin">Kotlin (.kt)</option>
                            <option value="scala">Scala (.scala)</option>
                            <option value="dart">Dart (.dart)</option>
                            <option value="html">HTML (.html)</option>
                            <option value="css">CSS (.css)</option>
                            <option value="scss">SCSS (.scss)</option>
                            <option value="sass">Sass (.sass)</option>
                            <option value="less">Less (.less)</option>
                            <option value="sql">SQL (.sql)</option>
                            <option value="mysql">MySQL (.sql)</option>
                            <option value="postgresql">PostgreSQL (.sql)</option>
                            <option value="json">JSON (.json)</option>
                            <option value="xml">XML (.xml)</option>
                            <option value="yaml">YAML (.yml)</option>
                            <option value="toml">TOML (.toml)</option>
                            <option value="markdown">Markdown (.md)</option>
                            <option value="shell">Shell Script (.sh)</option>
                            <option value="bash">Bash (.bash)</option>
                            <option value="powershell">PowerShell (.ps1)</option>
                            <option value="dockerfile">Dockerfile</option>
                            <option value="nginx">Nginx (.conf)</option>
                            <option value="apache">Apache (.conf)</option>
                            <option value="lua">Lua (.lua)</option>
                            <option value="perl">Perl (.pl)</option>
                            <option value="r">R (.r)</option>
                            <option value="matlab">MATLAB (.m)</option>
                            <option value="julia">Julia (.jl)</option>
                            <option value="haskell">Haskell (.hs)</option>
                            <option value="clojure">Clojure (.clj)</option>
                            <option value="elixir">Elixir (.ex)</option>
                            <option value="erlang">Erlang (.erl)</option>
                            <option value="fsharp">F# (.fs)</option>
                            <option value="vb">Visual Basic (.vb)</option>
                            <option value="objectivec">Objective-C (.m)</option>
                            <option value="assembly">Assembly (.asm)</option>
                            <option value="cobol">COBOL (.cob)</option>
                            <option value="fortran">Fortran (.f90)</option>
                            <option value="pascal">Pascal (.pas)</option>
                            <option value="scheme">Scheme (.scm)</option>
                            <option value="prolog">Prolog (.pl)</option>
                            <option value="tcl">TCL (.tcl)</option>
                        </select>
                    </div>
                    
                    <div class="controls-group">
                        <label for="speed-input">Speed (WPM):</label>
                        <input type="number" id="speed-input" value="60" min="10" max="200">
                    </div>
                    
                    <div class="controls-group">
                        <input type="checkbox" id="human-mode" style="margin-right: 4px;">
                        <label for="human-mode" style="cursor: pointer;" title="Mimics human mistakes and delays">Human Mode</label>
                    </div>

                    <div class="controls-group" id="mistake-rate-group" style="display: none;">
                        <label for="mistake-rate" title="Probability of a typing mistake (1-15%)">Mistake Rate:</label>
                        <input type="range" id="mistake-rate" min="1" max="15" value="5" style="width: 80px;">
                    </div>
                    
                    <div class="controls-group">
                        <button id="start-btn" class="btn primary">
                            <i class="fas fa-play"></i> Start Typing
                        </button>
                        <button id="pause-btn" class="btn" disabled>
                            <i class="fas fa-pause"></i> Pause
                        </button>
                        <button id="stop-btn" class="btn" disabled>
                            <i class="fas fa-stop"></i> Stop
                        </button>
                        <button id="record-btn" class="btn">
                            <i class="fas fa-record-vinyl"></i> Record
                        </button>
                    </div>
                </div>

                <!-- Code Input Area -->
                <div class="code-input-panel">
                    <h3>Enter your code:</h3>
                    <textarea id="code-input" placeholder="Paste your code here...">// Welcome to VSCode Typing Animation
function fibonacci(n) {
    if (n <= 1) return n;
    return fibonacci(n - 1) + fibonacci(n - 2);
}

// Generate first 10 fibonacci numbers
for (let i = 0; i < 10; i++) {
    console.log(`F(${i}) = ${fibonacci(i)}`);
}</textarea>
                </div>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-left">
                <span class="status-item">
                    <i class="fas fa-code-branch"></i> main
                </span>
                <span class="status-item">
                    <i class="fas fa-exclamation-triangle"></i> 0 errors
                </span>
            </div>
            <div class="status-right">
                <span class="status-item">Ln 1, Col 1</span>
                <span class="status-item">JavaScript</span>
                <span class="status-item">UTF-8</span>
            </div>
        </div>
    </div>

    <!-- Monaco Editor will be loaded by JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
